[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.39
board = esp32dev
framework = arduino
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    https://github.com/Legion2/Somfy_Remote_Lib.git
    https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git

check_tool = cppcheck
check_src_filters = +<src/>
# Skip package headers: cppcheck cannot evaluate the toolchain's __has_builtin()
# use in libstdc++ <c++config.h>, which otherwise aborts the whole check.
check_skip_packages = yes
check_flags =
    cppcheck: --enable=warning,style,performance,portability --inline-suppr --suppress=preprocessorErrorDirective --suppress=missingOverride --suppress=noExplicitConstructor

build_flags =
    -DINVERT_DIRECTION=0
