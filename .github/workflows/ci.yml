name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deduplicate:
    name: Deduplicate builds
    runs-on: ubuntu-latest
    outputs:
      skip_validation: ${{ steps.duplicate.outputs.skip }}

    steps:
      - name: Check for duplicate feature branch build
        id: duplicate
        uses: actions/github-script@v7
        with:
          script: |
            const isFeaturePush =
              context.eventName === "push" &&
              context.ref.startsWith("refs/heads/feature/");

            if (!isFeaturePush) {
              core.setOutput("skip", "false");
              return;
            }

            const branch = context.ref.replace("refs/heads/", "");
            const { owner, repo } = context.repo;
            const head = `${owner}:${branch}`;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              per_page: 1,
            });

            const skip = pulls.length > 0;
            core.setOutput("skip", skip ? "true" : "false");

            if (skip) {
              core.notice(`Skipping feature branch build because ${head} already has an open pull request.`);
            }

  build:
    name: Build
    needs: deduplicate
    if: needs.deduplicate.outputs.skip_validation != 'true'
    runs-on: ubuntu-latest
    # Matter links a large application; the first uncached build can take a
    # while, so allow generous headroom over the default job timeout.
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            .pio
          # Key on the platform pin and dependency list so the large Matter
          # toolchain and framework download are reused across runs.
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini', 'partitions.csv') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run static analysis
        run: pio check --fail-on-defect=low

      - name: Build firmware
        run: pio run
